<!DOCTYPE html>
<html>
<head>
    <title>Mot de passe oublié</title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <style>
body {
    background:#f3f3f3
    
    
}
.card {
    border-radius: 30px;
    background: #ffffff;
    backdrop-filter: blur(10px);
}
.form-control {
    border-radius: 30px;
    border: none;
    background: #ece3ee;
    padding-left: 15px;
}
.form-control:focus {
    box-shadow: 0 0 10px rgba(123, 47, 247, 0.5);
}
.btn-primary {
    background: linear-gradient(135deg, #8340ee, #f10da5);
    border: none;
    border-radius: 30px;
    padding: 10px;
    font-weight: bold;
}


</style>

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center py-5">

        <div class="col-md-4">

            <div class="card shadow p-4">
            
                <h3 class="text-center mb-4">
                    Réinitialisation du mot de passe
                </h3>
                 <p class="text-center text-muted"> Un lien de réinitialisation sera envoyé à votre adress e-mail enregistrée.</p>
                 <hr class="my-3">
                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                {% if success %}
                <div class="alert alert-success">
                    {{ success }}
                </div>
                {% endif %}

                <form method="POST">

                    <input  type="hidden"  name="email" value="{{ email }}"> <p class="text-center">
                        {{ email }} </p>

                    <button class="btn btn-primary w-100">  Envoyer le lien </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
