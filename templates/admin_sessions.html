<!DOCTYPE html>
<html>
<head>

    <title>Sessions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body{
    background:#f5f6fa;
}

       .sidebar{
    width:250px;
    height:100vh;
    background:white;
    position:fixed;
    padding-top:20px;
    border-right:1px solid #ddd;
}
.sidebar a{
    display:block;
    color:#444;
    text-decoration:none;
    padding:14px 20px;
    margin:5px 10px;
    border-radius:12px;
    transition:0.3s;
    font-weight:500;
}

.sidebar a:hover{
    background:#f3e8ff;
    color:#9333ea;
}

        .content{
            margin-left:260px;
            padding:30px;
        }

        .card{
            border:none;
            border-radius:20px;
        }

    
</style>
</head>

<body >
 <div class="sidebar">
 <h3 class="text-center mb-2"> <img src="{{ url_for('static', filename='logo1.png') }}" width="160"></h3>
    
    <a href="/admin">
        <i class="fa-solid fa-chart-line me-2"></i>
        Dashboard
        
    </a>
    

    <a href="/admin/users">
        <i class="fa-solid fa-users me-2"></i>
        Users
    </a>

    <a href="/admin/sessions">
        <i class="fa-solid fa-clock-rotate-left me-2"></i>
        Sessions
    </a>

    <a href="/admin/logs">
        <i class="fa-solid fa-file-lines me-2"></i>
        Logs
    </a>

    <a href="/admin/logout">
        <i class="fa-solid fa-right-from-bracket me-2"></i>
        Logout
    </a>
    </div>



<div class="content">

    <h2 class="mb-4">Sessions</h2>

    <table class="table table-bordered table-hover bg-white">

        <thead class="table-dark">

            <tr>
                <th>User</th>
                <th>Email</th>
                <th>IP</th>
                <th>Browser</th>
                <th>Login Date</th>
                <th>Expires</th>
                <th>Status</th>
            </tr>

        </thead>

        <tbody>

            {% for s in sessions %}

            <tr>

                <td>{{ s.nom }}</td>

                <td>{{ s.email }}</td>

                <td>{{ s.ip_address }}</td>

                <td>{{ s.user_agent }}</td>

                <td>{{ s.created_at }}</td>

                <td>{{ s.expires_at }}</td>

                <td>

                    {% if s.is_revoked == 0 %}

                        <span class="badge bg-success">
                            Active
                        </span>

                    {% else %}

                        <span class="badge bg-danger">
                            Closed
                        </span>

                    {% endif %}

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
