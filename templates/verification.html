<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:#f3f3f3;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8340ee, #f10da5);
            border: none;
            border-radius: 30px;
            padding: 10px;
            font-weight: bold;
        }

        .form-control {
            border-radius: 30px;
            border: none;
            background: #ece3ee;
            padding-left: 15px;
        }

        .form-control:focus {
            box-shadow: 0 0 10px rgba(123, 47, 247, 0.5);
        }
    </style>
</head>

<body class="bg-light">

<div class="container">
    <div class="row justify-content-center py-5">
        <div class="col-md-4">

            <div class="card shadow p-4">

                <!-- IMAGE -->
                <div class="text-center mb-3">
                    <img src="https://cdn-icons-png.flaticon.com/512/561/561188.png" width="80">
                    <div class="overlay"></div>

   
                </div>

                <h2 class="text-center mb-2">Verification Code</h2>

                <!-- MESSAGE -->
                <p class="text-center text-muted">
                     📩 Un code de vérification a été envoyé a votre adresse e-mail. Entrer le ici.
                </p>

                <form method="POST" action="/verification">

                    <div class="mb-3">
                        <input type="text" name="code"
                               class="form-control"
                               placeholder="Enter code"
                               required>
                    </div>

                    <button class="btn btn-primary w-100">
                        Confirm
                    </button>

                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
