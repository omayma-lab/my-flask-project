<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
body{
    background: linear-gradient(135deg,#eef2ff,#fdf2f8);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.card {
    border-radius: 30px;
    background: #ffffff;
    backdrop-filter: blur(10px);
     border:none;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
.card > * {
    position: relative;
    z-index: 2;
}


.form-control {
    border-radius: 30px;
    border: none;
    background: #ece3ee;
    padding-left: 15px;
}

.input-group-text {
    border-radius: 30px 0 0 30px;
    border: none;
    background: linear-gradient(135deg, #7b1ff5, #f107a3);
    color: white;
}

.form-control:focus {
    box-shadow: 0 0 10px rgba(123, 47, 247, 0.5);
}


.btn-primary {
    background: linear-gradient(135deg, #8340ee, #f107a3);
    border: none;
    border-radius: 30px;
    padding: 10px;
    font-weight: bold;
}
.btn-primary:hover{
    transform:translateY(-2px);
    transition:0.3s;
}



.title-box {
    
    display: inline-block;
    padding: 10px 20px;
    color: white;
    position: relative;
    
}

.title-box::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #7b2ff7, #f107a3);
    top: 0;
    left: 0;
    border-radius: 20px 50px 20px 50px;
    z-index: -1;
}
.social-btn{
    width:55px;
    height:55px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    transition:0.3s ease;
}

.social-btn:hover{
    transform:scale(1.1);
}

#forgotLink:hover{
    text-decoration:underline;
}



</style>
</head>

<body >
    
<div class="container">
    <div class="row justify-content-center py-5">
        <div class="col-md-4">

            <div class="card shadow p-4">
          <div class="text-center mb-3">

    <img src="{{ url_for('static', filename='logo .png') }}"
         width="110"
         class="mb-3">

    <h3 class="fw-bold text-dark">
    Créer un compte
</h3>

<p class="text-muted small">
    Bienvenue ! Veuillez remplir vos informations
</p>

</div>

                {% if message %}
                    <div class="alert alert-danger">{{ message }}</div>
                {%  endif %}
               

                <form method="POST" action="/register" onsubmit="return validateForm()">

                    <div class="mb-3">
                        Nom 
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="nom" id="nom" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" id="email" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>

                            <input type="password" name="password" id="password" class="form-control">

                           <span  onclick="togglePassword()" style="cursor:pointer;">
                              <i class="bi bi-eye" id="eyeIcon"></i>
                           </span>
                        
                        </div>
                    </div>

                    <button class="btn btn-primary w-100">s'inscrire</button>

                </form>
                 <div class="d-flex align-items-center my-2">
        <hr class="flex-grow-1">
        <span class="mx-2 text-muted small">
            ou continuer avec
        </span>
        <hr class="flex-grow-1">
    </div>
       <div class="d-flex justify-content-center gap-4 mb-4">

        <a href="/google"
           class="btn btn-light rounded-circle shadow-sm social-btn">
            <i class="fa-brands fa-google text-danger"></i>
        </a>

        <a href="#"
           class="btn btn-light rounded-circle shadow-sm social-btn">
            <i class="fa-brands fa-facebook-f text-primary"></i>
        </a>

    </div>

                <p class="text-center mt-2">
                    Déjà un compte ? <a href="/login" class="text-decoration-none fw-bold text-primary">Connexion</a>
                </p>

            </div>

        </div>
    </div>
</div>

<script>
function validateForm() {
    let nom = document.getElementById("nom").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if (nom === "" || email === "" || password === "") {
        alert("Tous les champs sont obligatoires ❌");
        return false;
    }

    if (password.length < 6) {
        alert("Password doit contenir au moins 6 caractères ❌");
        return false;
    }

    return true;

}
function togglePassword() {
    let password = document.getElementById("password");
    let icon = document.getElementById("eyeIcon");

    if (password.type === "password") {
        password.type = "text";         
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    } else {
        password.type = "password";   
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    }
}
</script>

</body>
</html>
