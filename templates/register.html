<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
body {
    background:#f3f3f3
    
    
}
.card {
    border-radius: 30px;
    background: #ffffff;
    backdrop-filter: blur(10px);
}
.card > * {
    position: relative;
    z-index: 2;
}


.form-control {
    border-radius: 30px;
    border: none;
    background: #ece3ee;
    padding-left: 15px;
}

.input-group-text {
    border-radius: 30px 0 0 30px;
    border: none;
    background: linear-gradient(135deg, #7b1ff5, #f107a3);
    color: white;
}

.form-control:focus {
    box-shadow: 0 0 10px rgba(123, 47, 247, 0.5);
}


.btn-primary {
    background: linear-gradient(135deg, #8340ee, #f10da5);
    border: none;
    border-radius: 30px;
    padding: 10px;
    font-weight: bold;
}



.title-box {
    
    display: inline-block;
    padding: 10px 20px;
    color: white;
    position: relative;
    
}

.title-box::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #7b2ff7, #f107a3);
    top: 0;
    left: 0;
    border-radius: 20px 50px 20px 50px;
    z-index: -1;
}
.social-btn {
    border-radius: 30px;
    padding: 10px;
    transition: 0.3s;
}

.social-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}



</style>
</head>

<body >
    
<div class="container">
    <div class="row justify-content-center py-5">
        <div class="col-md-4">

            <div class="card shadow p-4">
               <h3 class="title-box text-center">Créer un compte</h3>

                {% if message %}
                    <div class="alert alert-danger">{{ message }}</div>
                {%  endif %}
               <h3 class="text-center mb-2"><img src="{{ url_for('static', filename='logo .png') }}" width="120"></h3>

                <form method="POST" action="/register" onsubmit="return validateForm()">

                    <div class="mb-3">
                        Nom 
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="nom" id="nom" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" id="email" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>

                            <input type="password" name="password" id="password" class="form-control">

                            <span  onclick="togglePassword()" style="cursor:pointer;">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                              </span>
                        
                        </div>
                    </div>

                    <button class="btn btn-primary w-100">s'inscrire</button>

                </form>
                

                <p class="text-center mt-3">
                    Déjà un compte ? <a href="/login">Login</a>
                </p>

            </div>

        </div>
    </div>
</div>

<script>
function validateForm() {
    let nom = document.getElementById("nom").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if (nom === "" || email === "" || password === "") {
        alert("Tous les champs sont obligatoires ❌");
        return false;
    }

    if (password.length < 6) {
        alert("Password doit contenir au moins 6 caractères ❌");
        return false;
    }

    return true;

}
function togglePassword() {
    let password = document.getElementById("password");
    let icon = document.getElementById("eyeIcon");

    if (password.type === "password") {
        password.type = "text";         
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    } else {
        password.type = "password";   
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    }
}
</script>

</body>
</html>
