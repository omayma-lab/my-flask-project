<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>

body {
    background:#f3f3f3
    
    
}

.card {
    border-radius: 30px;
    background: #ffffff;
    backdrop-filter: blur(10px);
}
.card > * {
    position: relative;
    z-index: 2;
}
.input-group-text {
    border-radius: 30px 0 0 30px;
    border: none;
    background: linear-gradient(135deg, #7b1ff5, #f107a3);
    color: white;
}
.form-control {
    border-radius: 30px;
    border: none;
    background: #ece3ee;
    padding-left: 15px;
}
.form-control:focus {
    box-shadow: 0 0 10px rgba(123, 47, 247, 0.5);
}
.btn-primary {
    background: linear-gradient(135deg, #8340ee, #f10da5);
    border: none;
    border-radius: 30px;
    padding: 10px;
    font-weight: bold;
}
.title-box {
    
    display: inline-block;
    padding: 10px 20px;
    color: white;
    position: relative;
    
}
.btn-light{
    width:50px;
    height:50px;
    display:flex;
    align-items:center;
    justify-content:center;
}




    </style>


</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center py-5">
              <div class="col-md-4">
                 <div class="card shadow p-4">
                    <div class="text-center mb-3">

    <img src="{{ url_for('static', filename='logo .png') }}"
         width="110"
         class="mb-3">

    <h3 class="fw-bold">
        Connexion
    </h3>

</div>
                    {% if success %}
                       <div class ="alert alert-success"> {{ success }}</div>
                    {%  endif %}
                    {% if error %}
                       <div class ="alert alert-success"> {{ error }} </div>
                    {%  endif %}

                         <form method="POST" action="/login" onsubmit="return validateForm()">
                    <div class="mb-3">
                    
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" id="email" class="form-control"  placeholder="email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                      
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>

                            <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
                        
                        </div>
                    </div>
    <button class="btn btn-primary w-100">Se connecter</button>
</form>
                   
<div class="text-center mt-2">

    <a id="forgotLink"
       href="/forgot-password"
       class="text-decoration-none text-primary small">
        Mot de passe oublié ?
    </a>

    <div class="d-flex align-items-center my-2">
        <hr class="flex-grow-1">
        <span class="mx-2 text-muted small">
            ou continuer avec
        </span>
        <hr class="flex-grow-1">
    </div>

    <div class="d-flex justify-content-center gap-4 mb-4">

        <a href="/google"
           class="btn btn-light rounded-circle shadow-sm social-btn">
            <i class="fa-brands fa-google text-danger"></i>
        </a>

        <a href="#"
           class="btn btn-light rounded-circle shadow-sm social-btn">
            <i class="fa-brands fa-facebook-f text-primary"></i>
        </a>

    </div>

    <p class="small text-muted">
        Vous n’avez pas encore de compte ?
        <a href="/register"
           class="text-decoration-none fw-bold text-primary">
            Créer un compte
        </a>
    </p>

</div>
                 </div>


                </div>
        </div>
    </div>

<script>
function validateForm() {
    
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if ( email === "" || password === "") {
        alert("Tous les champs sont obligatoires ❌");
        return false;
    }

    

}
const emailInput =
document.querySelector('input[name="email"]');

const forgotLink =
document.getElementById("forgotLink");

emailInput.addEventListener("input", function(){

    forgotLink.href =
    "/forgot-password?email="
    + encodeURIComponent(emailInput.value);

});
</script>
</body>
</html>
