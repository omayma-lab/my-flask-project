<!DOCTYPE html>
<html>

<head>
    <title>Reset Password</title>

      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
body {
    background:#f3f3f3
    
    
}
.card {
    border-radius: 30px;
    background: #ffffff;
    backdrop-filter: blur(10px);
}
.form-control {
    border-radius: 30px;
    border: none;
    background: #ece3ee;
    padding-left: 15px;
}
.form-control:focus {
    box-shadow: 0 0 10px rgba(123, 47, 247, 0.5);
}
.btn-primary {
    background: linear-gradient(135deg, #8340ee, #f10da5);
    border: none;
    border-radius: 30px;
    padding: 10px;
    font-weight: bold;
}

</style>
</head>

<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center py-5">
              <div class="col-md-4">
                 <div class="card shadow p-4">

                <h3 class="text-center mb-4">
                    Nouveau mot de passe
                </h3>

                <form method="POST">

                    <input type="password"  name="password"  class="form-control mb-3"  placeholder="Nouveau mot de passe"  required>

                    <button class="btn btn-primary w-100">   Modifier </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
